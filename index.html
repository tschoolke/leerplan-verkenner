<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leerplan Verkenner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .filter-chip.active {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .sticky-header th {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: #1e293b;
        }

        tr:nth-child(even) {
            background-color: #f1f5f9;
        }

        .col-compact { width: 140px; white-space: nowrap; }
        .col-content { min-width: 400px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- Sidebar voor Filters -->
    <aside id="sidebar" class="w-80 bg-white border-r border-slate-200 flex flex-col transition-all duration-300 z-20 shadow-sm">
        <div class="p-5 bg-slate-900 text-white flex justify-between items-center">
            <h2 class="font-bold text-sm tracking-widest uppercase flex items-center gap-2">
                <i class="fas fa-filter text-blue-400"></i> Filters
            </h2>
            <button onclick="resetFilters()" class="text-[10px] bg-slate-800 hover:bg-slate-700 px-2 py-1 rounded border border-slate-700">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
        
        <div id="filterContainer" class="flex-1 overflow-y-auto p-5 space-y-6 custom-scrollbar">
            <div class="text-center py-10 text-slate-400 italic text-sm">
                Geen filters beschikbaar.
            </div>
        </div>
    </aside>

    <!-- Hoofdpaneel -->
    <main class="flex-1 flex flex-col min-w-0">
        <header class="bg-white border-b border-slate-200 p-4 shadow-sm z-10">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500 border border-slate-200">
                    <i class="fas fa-bars"></i>
                </button>
                
                <div class="flex items-center gap-2 bg-slate-100 rounded-lg px-3 py-1.5 border border-slate-200">
                    <select id="fileSelector" onchange="handleFileSelection()" class="bg-transparent text-sm font-semibold text-slate-700 outline-none cursor-pointer">
                        <option value="">-- Selecteer Leerplan --</option>
                        <option value="https://raw.githubusercontent.com/tschoolke/leerplan-verkenner/refs/heads/main/LP-Ned_com_B_S.csv">Nederlands</option>
                        <option value="https://raw.githubusercontent.com/tschoolke/leerplan-verkenner/refs/heads/main/LP-wiskunde_B_S.csv">Wiskunde</option>
                        <option value="local">Eigen CSV uploaden...</option>
                    </select>
                </div>

                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input 
                        type="text" 
                        id="searchInput"
                        oninput="handleSearch()"
                        placeholder="Zoek in leerplan..."
                        class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-blue-500 rounded-lg outline-none text-sm transition-all"
                    >
                </div>

                <input type="file" id="csvUpload" accept=".csv" class="hidden" onchange="handleFileUpload(event)">
                <div id="resultCount" class="text-xs font-bold text-blue-600 px-3">0 resultaten</div>
            </div>
        </header>

        <!-- Tabel Sectie -->
        <div class="flex-1 overflow-auto p-4 custom-scrollbar" id="mainContentScroll">
            <div id="welcomeMessage" class="max-w-xl mx-auto mt-20 text-center">
                <i class="fas fa-file-csv text-slate-200 text-6xl mb-4"></i>
                <h2 class="text-xl font-bold text-slate-800">Kies een leerplan om te starten</h2>
                <p class="text-slate-500 text-sm mt-2">Gebruik het menu hierboven om een standaard leerplan te laden of upload je eigen bestand.</p>
            </div>

            <div id="tableWrapper" class="hidden bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left border-collapse" id="mainTable">
                    <thead>
                        <tr id="tableHeaderRow" class="text-white sticky-header"></tr>
                    </thead>
                    <tbody id="tableBody" class="text-[13px] text-slate-600 divide-y divide-slate-100"></tbody>
                </table>
            </div>

            <div id="emptyState" class="hidden text-center py-20">
                <i class="fas fa-search text-slate-200 text-5xl mb-4"></i>
                <h3 class="text-lg font-bold text-slate-700">Geen matches gevonden</h3>
            </div>
        </div>
    </main>

    <script>
        let rawData = [];
        let allHeaders = [];
        let visibleHeaders = [];
        let filterColumns = [];
        let activeFilters = {};
        let searchTerm = '';

        function cleanHeader(h) {
            return h ? h.replace(/["\r\n\t]+/g, ' ').trim() : "";
        }

        function isTechnicalHeader(h) {
            const clean = h.toLowerCase().replace(/[^a-z]/g, '');
            return ['doelsoort', 'lfmd', 'nrmd', 'md'].includes(clean);
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
            if (lines.length === 0) return [];
            const delimiter = lines[0].split(';').length > lines[0].split(',').length ? ';' : ',';
            
            return lines.map(line => {
                const result = [];
                let cell = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === delimiter && !inQuotes) { result.push(cell.trim()); cell = ''; }
                    else cell += char;
                }
                result.push(cell.trim());
                return result;
            });
        }

        async function handleFileSelection() {
            const val = document.getElementById('fileSelector').value;
            if (val === "local") { document.getElementById('csvUpload').click(); return; }
            if (!val) return resetUI();

            try {
                const res = await fetch(val);
                const text = await res.text();
                processData(text);
            } catch (e) { alert("Fout bij laden."); }
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => processData(ev.target.result);
            reader.readAsText(file);
        }

        function processData(text) {
            const rows = parseCSV(text);
            if (rows.length < 2) return;
            allHeaders = rows[0].map(h => cleanHeader(h));
            rawData = rows.slice(1).map(row => {
                const obj = {};
                allHeaders.forEach((h, i) => obj[h] = row[i] || "");
                return obj;
            });

            visibleHeaders = allHeaders.filter(h => !isTechnicalHeader(h) && h !== "");
            const filterBlacklist = ['doel', 'voorbeeld', 'toelichting', 'tekst', 'woordenschat'];
            filterColumns = visibleHeaders.filter(h => !filterBlacklist.some(word => h.toLowerCase().includes(word))).slice(0, 8);
            
            activeFilters = {};
            document.getElementById('welcomeMessage').classList.add('hidden');
            document.getElementById('tableWrapper').classList.remove('hidden');
            setupTable();
            renderFilters();
            renderTable();
        }

        function setupTable() {
            const hr = document.getElementById('tableHeaderRow');
            hr.innerHTML = visibleHeaders.map(h => {
                const isShort = filterColumns.includes(h);
                const isLong = h.toLowerCase().includes('doel') || h.toLowerCase().includes('voorbeeld');
                return `<th class="px-4 py-3 text-[10px] font-bold uppercase border-r border-slate-700 ${isShort ? 'col-compact bg-slate-800' : (isLong ? 'col-content' : 'min-w-[150px]')}">${h}</th>`;
            }).join('');
        }

        function renderFilters() {
            const container = document.getElementById('filterContainer');
            container.innerHTML = filterColumns.map(col => {
                const values = [...new Set(rawData.map(d => String(d[col]).trim()))].filter(v => v).sort();
                return `
                    <div class="space-y-2">
                        <h3 class="text-[10px] font-bold text-slate-500 uppercase">${col}</h3>
                        <div class="flex flex-wrap gap-1">
                            ${values.map(v => `
                                <button onclick="toggleFilter('${col}', '${v}')" 
                                    class="filter-chip px-2 py-1 text-[10px] border rounded transition-all ${activeFilters[col]?.includes(v) ? 'active' : 'bg-white text-slate-600 border-slate-200'}">
                                    ${v}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleFilter(col, val) {
            if (!activeFilters[col]) activeFilters[col] = [];
            const i = activeFilters[col].indexOf(val);
            if (i > -1) activeFilters[col].splice(i, 1);
            else activeFilters[col].push(val);
            renderFilters();
            renderTable();
        }

        function handleSearch() {
            searchTerm = document.getElementById('searchInput').value.toLowerCase();
            renderTable();
        }

        function renderTable() {
            const filtered = rawData.filter(item => {
                const matchesSearch = Object.values(item).some(v => String(v).toLowerCase().includes(searchTerm));
                const matchesFilters = Object.entries(activeFilters).every(([col, vals]) => !vals.length || vals.includes(item[col]));
                return matchesSearch && matchesFilters;
            });

            document.getElementById('resultCount').textContent = `${filtered.length} resultaten`;
            const tbody = document.getElementById('tableBody');
            document.getElementById('emptyState').classList.toggle('hidden', filtered.length > 0);
            
            tbody.innerHTML = filtered.map(item => `
                <tr class="hover:bg-blue-50/50">
                    ${visibleHeaders.map(h => `<td class="px-4 py-3 border-r border-slate-100 last:border-0">${item[h] || '-'}</td>`).join('')}
                </tr>
            `).join('');
        }

        function resetFilters() {
            activeFilters = {};
            document.getElementById('searchInput').value = '';
            searchTerm = '';
            renderFilters();
            renderTable();
        }

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            s.style.width = s.style.width === '0px' ? '320px' : '0px';
        }

        function resetUI() {
            document.getElementById('welcomeMessage').classList.remove('hidden');
            document.getElementById('tableWrapper').classList.add('hidden');
            document.getElementById('filterContainer').innerHTML = '';
        }
    </script>
</body>
</html>
