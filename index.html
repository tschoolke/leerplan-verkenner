<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leerplan Verkenner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .filter-chip.active {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
        }

        .sticky-header th {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: #1e293b;
        }

        tr:nth-child(even) {
            background-color: #f1f5f9;
        }

        /* Kolom instellingen */
        .col-fixed-sm { width: 100px; min-width: 100px; }
        .col-fixed-md { width: 150px; min-width: 150px; }
        .col-doel { min-width: 450px; }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- Sidebar voor Filters -->
    <aside id="sidebar" class="w-80 bg-white border-r border-slate-200 flex flex-col transition-all duration-300 z-20 shadow-sm shrink-0">
        <div class="p-5 bg-slate-900 text-white flex justify-between items-center">
            <h2 class="font-bold text-sm tracking-widest uppercase flex items-center gap-2">
                <i class="fas fa-filter text-blue-400"></i> Filters
            </h2>
            <button onclick="resetFilters()" class="text-[10px] bg-slate-800 hover:bg-slate-700 px-2 py-1 rounded border border-slate-700 transition-colors">
                <i class="fas fa-sync-alt mr-1"></i> Reset
            </button>
        </div>
        
        <div id="filterContainer" class="flex-1 overflow-y-auto p-5 space-y-6 custom-scrollbar">
            <div class="text-center py-10 text-slate-400 italic text-sm">
                Selecteer een leerplan om filters te laden.
            </div>
        </div>
    </aside>

    <!-- Hoofdpaneel -->
    <main class="flex-1 flex flex-col min-w-0">
        <header class="bg-white border-b border-slate-200 p-4 shadow-sm z-10">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2.5 hover:bg-slate-100 rounded-xl text-slate-500 border border-slate-200 transition-all">
                    <i class="fas fa-bars"></i>
                </button>
                
                <div class="flex items-center gap-2 bg-slate-100 rounded-xl px-3 py-1.5 border border-slate-200">
                    <i class="fas fa-book-open text-slate-400 text-xs"></i>
                    <select id="fileSelector" onchange="handleFileSelection()" class="bg-transparent text-sm font-semibold text-slate-700 outline-none cursor-pointer pr-4">
                        <option value="">-- Kies een leerplan --</option>
                        <option value="https://raw.githubusercontent.com/tschoolke/leerplan-verkenner/refs/heads/main/LP-Ned_com_B_S.csv">Nederlands</option>
                        <option value="https://raw.githubusercontent.com/tschoolke/leerplan-verkenner/refs/heads/main/LP-wiskunde_B_S.csv">Wiskunde</option>
                        <option value="local">Eigen CSV uploaden...</option>
                    </select>
                </div>

                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input 
                        type="text" 
                        id="searchInput"
                        oninput="handleSearch()"
                        placeholder="Zoek op tekst, code of domein..."
                        class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-blue-500 rounded-xl outline-none text-sm transition-all"
                    >
                </div>

                <input type="file" id="csvUpload" accept=".csv" class="hidden" onchange="handleFileUpload(event)">
                <div id="resultCount" class="hidden sm:block text-xs font-bold text-blue-600 bg-blue-50 border border-blue-100 px-4 py-2.5 rounded-xl whitespace-nowrap">
                    0 resultaten
                </div>
            </div>
        </header>

        <!-- Tabel Sectie -->
        <div class="flex-1 overflow-auto p-4 custom-scrollbar" id="mainContentScroll">
            <div id="welcomeMessage" class="max-w-xl mx-auto mt-20 text-center bg-white p-10 rounded-3xl border border-slate-200 shadow-sm">
                <div class="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">
                    <i class="fas fa-rocket"></i>
                </div>
                <h2 class="text-xl font-bold text-slate-800">Kies een leerplan</h2>
                <p class="text-slate-500 text-sm mt-2 leading-relaxed">Selecteer een vak in het menu of sleep een eigen CSV-bestand in dit venster om te beginnen met verkennen.</p>
            </div>

            <div id="tableWrapper" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-w-max">
                <table class="w-full text-left border-collapse table-fixed" id="mainTable">
                    <thead>
                        <tr id="tableHeaderRow" class="text-white sticky-header"></tr>
                    </thead>
                    <tbody id="tableBody" class="text-[13px] text-slate-600 divide-y divide-slate-100"></tbody>
                </table>
            </div>

            <div id="emptyState" class="hidden text-center py-32 bg-white rounded-2xl border border-dashed border-slate-300">
                <i class="fas fa-search text-slate-200 text-6xl mb-4"></i>
                <h3 class="text-xl font-bold text-slate-700">Geen matches gevonden</h3>
                <p class="text-slate-400 mt-1">Pas je filters of zoekopdracht aan.</p>
            </div>
        </div>
    </main>

    <script>
        let rawData = [];
        let allHeaders = [];
        let visibleHeaders = [];
        let filterColumns = [];
        let activeFilters = {};
        let searchTerm = '';

        // Opschonen van headers (verwijdert regeleindes en quotes)
        function cleanHeader(h) {
            if (!h) return "";
            return h.replace(/["\r\n\t]+/g, ' ').replace(/\s+/g, ' ').trim();
        }

        // Bepaalt of een kolom technisch is (niet tonen in tabel)
        function isTechnicalHeader(h) {
            const clean = h.toLowerCase().replace(/[^a-z]/g, '');
            // We laten Doelsoort, nrMD etc. alleen in de filters, niet in de tabel
            return ['doelsoort', 'lfmd', 'nrmd', 'md'].includes(clean);
        }

        // De robuuste CSV parser
        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
            if (lines.length === 0) return [];
            
            // Auto-detectie van scheidingsteken
            const firstLine = lines[0];
            const delimiter = firstLine.split(';').length > firstLine.split(',').length ? ';' : ',';
            
            return lines.map(line => {
                const result = [];
                let cell = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === delimiter && !inQuotes) {
                        result.push(cell.trim());
                        cell = '';
                    } else {
                        cell += char;
                    }
                }
                result.push(cell.trim());
                return result;
            });
        }

        async function handleFileSelection() {
            const val = document.getElementById('fileSelector').value;
            if (val === "local") { document.getElementById('csvUpload').click(); return; }
            if (!val) return resetUI();

            try {
                const res = await fetch(val);
                const text = await res.text();
                processData(text);
            } catch (e) { alert("Kon bestand niet laden."); }
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => processData(ev.target.result);
            reader.readAsText(file);
        }

        function processData(text) {
            const rows = parseCSV(text);
            if (rows.length < 2) return;
            
            // Headers opschonen
            allHeaders = rows[0].map(h => cleanHeader(h));
            
            // Data omzetten naar objecten
            rawData = rows.slice(1).map(row => {
                const obj = {};
                allHeaders.forEach((h, i) => {
                    obj[h] = row[i] || "";
                });
                return obj;
            });

            // Welke kolommen tonen we in de tabel?
            visibleHeaders = allHeaders.filter(h => !isTechnicalHeader(h) && h !== "");

            // Welke kolommen gebruiken we als filter-knoppen?
            // Prioriteit: de eerste 8 kolommen die GEEN lange tekst bevatten
            const filterBlacklist = ['doel', 'voorbeeld', 'toelichting', 'tekst', 'woordenschat', 'coherentie'];
            filterColumns = allHeaders.filter(h => {
                const lower = h.toLowerCase();
                return !filterBlacklist.some(word => lower.includes(word)) && h !== "";
            }).slice(0, 9); // We nemen de eerste 9 geschikte kolommen
            
            activeFilters = {};
            document.getElementById('welcomeMessage').classList.add('hidden');
            document.getElementById('tableWrapper').classList.remove('hidden');
            
            setupTableHeader();
            renderFilters();
            renderTable();
        }

        function setupTableHeader() {
            const hr = document.getElementById('tableHeaderRow');
            hr.innerHTML = visibleHeaders.map(h => {
                const lower = h.toLowerCase();
                let cls = 'px-4 py-4 text-[10px] font-black uppercase tracking-widest border-r border-slate-700 ';
                
                if (lower.includes('code') || lower.includes('jaar')) cls += 'col-fixed-sm';
                else if (lower.includes('domein') || lower.includes('cluster')) cls += 'col-fixed-md';
                else if (lower.includes('doel')) cls += 'col-doel';
                else cls += 'w-[150px]';

                return `<th class="${cls}">${h}</th>`;
            }).join('');
        }

        function renderFilters() {
            const container = document.getElementById('filterContainer');
            if (filterColumns.length === 0) {
                container.innerHTML = '<p class="text-slate-400 text-xs italic">Geen filters beschikbaar voor dit bestand.</p>';
                return;
            }

            container.innerHTML = filterColumns.map(col => {
                // Haal unieke waarden op
                const values = [...new Set(rawData.map(d => String(d[col]).trim()))]
                    .filter(v => v && v !== "undefined" && v !== "-")
                    .sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));

                if (values.length === 0) return '';

                return `
                    <div class="bg-slate-50 border border-slate-100 rounded-xl p-3 space-y-3">
                        <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${col}</h3>
                        <div class="flex flex-wrap gap-1.5 max-h-40 overflow-y-auto custom-scrollbar pr-1">
                            ${values.map(v => {
                                const active = activeFilters[col]?.includes(v);
                                return `
                                    <button onclick="toggleFilter('${col}', '${v.replace(/'/g, "\\'")}')" 
                                        class="filter-chip px-2.5 py-1 text-[10px] border rounded-lg transition-all font-medium ${active ? 'active' : 'bg-white text-slate-600 border-slate-200 hover:border-blue-300'}">
                                        ${v}
                                    </button>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleFilter(col, val) {
            if (!activeFilters[col]) activeFilters[col] = [];
            const i = activeFilters[col].indexOf(val);
            if (i > -1) activeFilters[col].splice(i, 1);
            else activeFilters[col].push(val);
            renderFilters();
            renderTable();
        }

        function handleSearch() {
            searchTerm = document.getElementById('searchInput').value.toLowerCase();
            renderTable();
        }

        function renderTable() {
            const filtered = rawData.filter(item => {
                const matchesSearch = Object.values(item).some(v => String(v).toLowerCase().includes(searchTerm));
                const matchesFilters = Object.entries(activeFilters).every(([col, vals]) => {
                    return !vals.length || vals.includes(String(item[col]).trim());
                });
                return matchesSearch && matchesFilters;
            });

            document.getElementById('resultCount').textContent = `${filtered.length} resultaten`;
            const tbody = document.getElementById('tableBody');
            
            if (filtered.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                document.getElementById('tableWrapper').classList.add('hidden');
            } else {
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('tableWrapper').classList.remove('hidden');
                
                tbody.innerHTML = filtered.map(item => `
                    <tr class="hover:bg-blue-50/50 transition-colors">
                        ${visibleHeaders.map(h => {
                            const val = item[h] || '-';
                            const isCode = h.toLowerCase().includes('code');
                            const isDoel = h.toLowerCase().includes('doel');
                            
                            let content = val;
                            if (isCode) content = `<span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded border border-blue-100 font-mono font-bold">${val}</span>`;
                            if (isDoel) content = `<div class="font-medium text-slate-800 leading-relaxed">${val}</div>`;

                            return `<td class="px-4 py-4 border-r border-slate-100 last:border-0 align-top">${content}</td>`;
                        }).join('')}
                    </tr>
                `).join('');
            }
        }

        function resetFilters() {
            activeFilters = {};
            document.getElementById('searchInput').value = '';
            searchTerm = '';
            renderFilters();
            renderTable();
        }

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            s.classList.toggle('w-80');
            s.classList.toggle('w-0');
        }

        function resetUI() {
            document.getElementById('welcomeMessage').classList.remove('hidden');
            document.getElementById('tableWrapper').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('filterContainer').innerHTML = '<div class="text-center py-10 text-slate-400 italic text-sm">Selecteer een leerplan.</div>';
        }
    </script>
</body>
</html>
